services:
  - type: web
    name: luxury-estate-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npx vite build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://luxury-estate-backend.onrender.com/api
